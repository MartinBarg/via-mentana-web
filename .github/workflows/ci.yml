name: CI

on:
  pull_request:

jobs:
  ci:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test:coverage
        env:
          CLIENT_ID: via-mentana

      - name: Dead code (report only)
        run: npm run deadcode
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          CLIENT_ID: via-mentana
